{% extends "base.html" %}
{% block title %}Reportes{% endblock %}

{% block extra_head %}
<style>
    .report-viewer {
        background: #1a2e1a;
        color: #0f0;
        font-family: 'Courier New', monospace;
        font-size: 0.85rem;
        padding: 1rem;
        border-radius: 6px;
        max-height: 500px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
        margin-top: 0.75rem;
    }
    .file-row { cursor: pointer; }
    .file-row:hover { background: #f5f5f5; }
    .card { margin-bottom: 1rem; }
    .card-header { cursor: pointer; }
    .subtype-section { margin-left: 1.5rem; margin-bottom: 0.5rem; }
    .subtype-header { cursor: pointer; padding: 0.4rem 0; font-weight: 600; color: #363636; }
    .subtype-header:hover { color: #3273dc; }
    .toggle-icon { margin-right: 0.4rem; transition: transform 0.15s; }
</style>
{% endblock %}

{% block content %}
<h1 class="title">
    <span class="icon"><i class="fas fa-folder-open"></i></span>
    <span>Reportes</span>
</h1>
<p class="subtitle">Reportes generados en runtime/reports/</p>

<div id="reports-loading" class="has-text-centered py-6">
    <span class="icon is-large"><i class="fas fa-spinner fa-spin fa-2x"></i></span>
</div>
<div id="reports-empty" class="notification is-warning" style="display:none;">
    No se encontraron reportes.
</div>
<div id="reports-error" class="notification is-danger" style="display:none;"></div>

<div id="reports-container"></div>
{% endblock %}

{% block extra_scripts %}
<script>
(function() {
    var container = document.getElementById('reports-container');
    var loading = document.getElementById('reports-loading');
    var empty = document.getElementById('reports-empty');
    var errorBox = document.getElementById('reports-error');

    function formatBytes(b) {
        if (b < 1024) return b + ' B';
        if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
        return (b / 1048576).toFixed(1) + ' MB';
    }

    function formatDate(iso) {
        var d = new Date(iso);
        return d.toLocaleString();
    }

    function loadReport(path, viewerId) {
        var viewer = document.getElementById(viewerId);
        if (viewer.style.display === 'block') { viewer.style.display = 'none'; return; }
        viewer.innerHTML = '<span class="icon"><i class="fas fa-spinner fa-spin"></i></span> Cargando...';
        viewer.style.display = 'block';
        fetch('/api/read-file?path=' + encodeURIComponent(path))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data.success) { viewer.textContent = 'Error: ' + data.error; return; }
                viewer.innerHTML = '';
                var pre = document.createElement('pre');
                pre.className = 'report-viewer';
                pre.textContent = data.content;
                var btn = document.createElement('button');
                btn.className = 'button is-small is-dark mt-2';
                btn.innerHTML = '<span class="icon"><i class="fas fa-times"></i></span><span>Cerrar</span>';
                btn.onclick = function() { viewer.style.display = 'none'; };
                viewer.appendChild(pre);
                viewer.appendChild(btn);
            })
            .catch(function(e) { viewer.textContent = 'Error: ' + e; });
    }

    function buildFileTable(files, idPrefix) {
        var table = '<table class="table is-fullwidth is-hoverable is-narrow">' +
            '<thead><tr><th>Archivo</th><th>Fecha</th><th>Tamano</th></tr></thead><tbody>';
        files.forEach(function(f, fi) {
            var vid = idPrefix + '-' + fi;
            table += '<tr class="file-row" onclick="window.__loadReport(\'' +
                f.path.replace(/'/g, "\\'") + "','" + vid + "')\">" +
                '<td><span class="icon"><i class="fas fa-file-alt"></i></span> ' +
                f.name + '</td><td>' + formatDate(f.modified_timestamp) +
                '</td><td>' + formatBytes(f.size_bytes) + '</td></tr>' +
                '<tr id="' + vid + '" style="display:none;"><td colspan="3"></td></tr>';
        });
        table += '</tbody></table>';
        return table;
    }

    function renderCategories(categories) {
        container.innerHTML = '';
        categories.forEach(function(cat, ci) {
            var card = document.createElement('div');
            card.className = 'card';

            var header = document.createElement('header');
            header.className = 'card-header';
            header.innerHTML = '<p class="card-header-title">' +
                '<span class="icon toggle-icon"><i class="fas fa-chevron-right"></i></span>' +
                '<span class="icon"><i class="fas fa-folder"></i></span>' +
                '<span>' + cat.name + ' (' + cat.total_files + ' reportes)</span></p>' +
                '<button class="card-header-icon" aria-label="toggle">' +
                '<span class="icon"><i class="fas fa-chevron-right"></i></span></button>';

            var content = document.createElement('div');
            content.className = 'card-content';
            content.style.display = 'none';

            cat.subtypes.forEach(function(st, si) {
                var section = document.createElement('div');
                section.className = 'subtype-section';
                var stHeader = document.createElement('div');
                stHeader.className = 'subtype-header';
                stHeader.innerHTML = '<span class="icon toggle-icon"><i class="fas fa-chevron-right"></i></span>' +
                    st.name + ' (' + st.files.length + ')';
                var stBody = document.createElement('div');
                stBody.style.display = 'none';
                stBody.innerHTML = buildFileTable(st.files, 'v-' + ci + '-' + si);
                stHeader.addEventListener('click', function() {
                    var open = stBody.style.display !== 'none';
                    stBody.style.display = open ? 'none' : '';
                    var ico = stHeader.querySelector('.toggle-icon .fas');
                    ico.className = open ? 'fas fa-chevron-right' : 'fas fa-chevron-down';
                });
                section.appendChild(stHeader);
                section.appendChild(stBody);
                content.appendChild(section);
            });

            header.addEventListener('click', function() {
                var open = content.style.display !== 'none';
                content.style.display = open ? 'none' : '';
                var icons = header.querySelectorAll('.toggle-icon .fas, .card-header-icon .fas');
                for (var i = 0; i < icons.length; i++) {
                    icons[i].className = open ? 'fas fa-chevron-right' : 'fas fa-chevron-down';
                }
            });
            card.appendChild(header);
            card.appendChild(content);
            container.appendChild(card);
        });
    }

    window.__loadReport = loadReport;

    function allFiles(categories) {
        var result = [];
        categories.forEach(function(cat) {
            cat.subtypes.forEach(function(st) {
                st.files.forEach(function(f) { result.push({cat: cat, file: f}); });
            });
        });
        return result;
    }

    function autoOpenFromQuery(categories) {
        var params = new URLSearchParams(window.location.search);
        var targetFile = params.get('file');
        if (!targetFile) return;
        var all = allFiles(categories);
        for (var i = 0; i < all.length; i++) {
            if (all[i].file.path === targetFile) {
                var vid = all[i].file.path;
                var el = document.querySelector('[onclick*="' + CSS.escape(vid) + '"]');
                if (el) {
                    var cardContent = el.closest('.card').querySelector('.card-content');
                    if (cardContent) cardContent.style.display = '';
                    var subtypeBody = el.closest('.subtype-section');
                    if (subtypeBody) {
                        var stBody = subtypeBody.querySelector('div:last-child');
                        if (stBody) stBody.style.display = '';
                    }
                    el.scrollIntoView({behavior: 'smooth', block: 'center'});
                }
                return;
            }
        }
    }

    fetch('/reports/api/list')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            loading.style.display = 'none';
            if (!data.categories || data.categories.length === 0) {
                empty.style.display = 'block'; return;
            }
            renderCategories(data.categories);
            autoOpenFromQuery(data.categories);
        })
        .catch(function(e) {
            loading.style.display = 'none';
            errorBox.textContent = 'Error cargando reportes: ' + e;
            errorBox.style.display = 'block';
        });
})();
</script>
{% endblock %}
