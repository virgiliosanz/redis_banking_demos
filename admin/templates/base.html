<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        // Apply saved theme immediately to prevent flash of wrong theme
        (function() {
            var theme = localStorage.getItem('admin-theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Panel de administracion{% endblock %} - nuevecuatrouno</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23363636'/%3E%3Cpath d='M50 20a30 30 0 0 1 0 60a30 30 0 0 1 0-60zm0 10a20 20 0 1 0 0 40a20 20 0 0 0 0-40zm0 8a4 4 0 1 1 0 8a4 4 0 0 1 0-8zM28 50h8M64 50h8M50 28v8M50 64v8' stroke='%23fff' stroke-width='4' fill='%23fff'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bulma.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fontawesome/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar is-dark" role="navigation" aria-label="main navigation">
        <div class="navbar-brand">
            <a class="navbar-item has-text-weight-bold" href="/">
                <span class="icon"><i class="fas fa-server"></i></span>
                <span>nuevecuatrouno admin</span>
            </a>
            <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="mainNavbar">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
            </a>
        </div>
        <div id="mainNavbar" class="navbar-menu">
            <div class="navbar-start">
                <a class="navbar-item" href="/diagnostics">
                    <span class="icon"><i class="fas fa-stethoscope"></i></span>
                    <span>Diagnosticos</span>
                </a>
                <a class="navbar-item" href="/metrics/">
                    <span class="icon"><i class="fas fa-chart-line"></i></span>
                    <span>Metricas</span>
                </a>
                <a class="navbar-item" href="/capacity/">
                    <span class="icon"><i class="fas fa-chart-area"></i></span>
                    <span>Capacidad</span>
                </a>
                <a class="navbar-item" href="/containers/">
                    <span class="icon"><i class="fas fa-cubes"></i></span>
                    <span>Contenedores</span>
                </a>
                <a class="navbar-item" href="/crontab/">
                    <span class="icon"><i class="fas fa-clock"></i></span>
                    <span>Crontab</span>
                </a>
                <a class="navbar-item" href="/sync/">
                    <span class="icon"><i class="fas fa-sync-alt"></i></span>
                    <span>Sincronizacion</span>
                </a>
                <a class="navbar-item" href="/rollover/">
                    <span class="icon"><i class="fas fa-calendar-alt"></i></span>
                    <span>Rollover</span>
                </a>
                <a class="navbar-item" href="/reports/">
                    <span class="icon"><i class="fas fa-folder-open"></i></span>
                    <span>Reportes</span>
                </a>
            </div>
        </div>
        <div class="navbar-end">
            <div class="navbar-item">
                <button id="themeToggle" class="has-text-white" title="Cambiar tema" aria-label="Cambiar tema">
                    <span class="icon">
                        <i class="fas fa-moon" id="themeIcon"></i>
                    </span>
                </button>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </section>

    <footer class="footer">
        <div class="content has-text-centered">
            <p><strong>nuevecuatrouno</strong> panel de administracion</p>
        </div>
    </footer>

    <script>
        // Bulma navbar burger toggle
        document.addEventListener('DOMContentLoaded', function() {
            var burgers = document.querySelectorAll('.navbar-burger');
            burgers.forEach(function(burger) {
                burger.addEventListener('click', function() {
                    var target = document.getElementById(burger.dataset.target);
                    burger.classList.toggle('is-active');
                    target.classList.toggle('is-active');
                });
            });
        });
    </script>
    <script src="{{ url_for('static', filename='js/timeago.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin-utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chart-helpers.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
