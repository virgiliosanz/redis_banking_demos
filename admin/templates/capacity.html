{% extends "base.html" %}
{% block title %}Capacidad{% endblock %}

{% block extra_head %}
<script src="{{ url_for('static', filename='vendor/chart.umd.min.js') }}"></script>
<style>
    .chart-container { position: relative; height: 280px; width: 100%; }
    .capacity-card { margin-bottom: 1.5rem; }
    .projection-tag { font-size: 0.9rem; }
</style>
{% endblock %}

{% block content %}
<h1 class="title">
    <span class="icon-text">
        <span class="icon"><i class="fas fa-chart-area"></i></span>
        <span>Planificacion de capacidad</span>
    </span>
</h1>
<h2 class="subtitle">Tendencias de 7 dias y proyecciones de crecimiento</h2>

<!-- Summary cards -->
<div class="columns is-multiline" id="summaryCards">
    <div class="column is-12">
        <div class="notification is-info is-light" id="loadingMsg">
            <span class="icon"><i class="fas fa-spinner fa-spin"></i></span>
            Cargando datos de capacidad...
        </div>
    </div>
</div>

<!-- Charts -->
<div id="chartsContainer"></div>

{% endblock %}

{% block extra_scripts %}
<script>
(function() {
    const COLORS = {
        disk: '#3273dc', memory: '#ff6384',
        elastic_docs: '#48c774', mysql_live: '#ffdd57', mysql_archive: '#f14668'
    };

    function createSummaryCard(m) {
        const col = document.createElement('div');
        col.className = 'column is-one-third-desktop is-half-tablet';
        let projection = '';
        if (m.threshold !== null && m.days_until_threshold !== null) {
            const cls = m.days_until_threshold < 30 ? 'is-danger' : m.days_until_threshold < 90 ? 'is-warning' : 'is-success';
            projection = '<span class="tag projection-tag ' + cls + '">~' + m.days_until_threshold + ' dias hasta ' + m.threshold + m.unit + '</span>';
        } else if (m.growth_per_day !== null) {
            const sign = m.growth_per_day >= 0 ? '+' : '';
            projection = '<span class="tag projection-tag is-info">' + sign + m.growth_per_day + ' ' + m.unit + '/dia</span>';
        } else {
            projection = '<span class="tag projection-tag is-light">Sin datos suficientes</span>';
        }
        const current = m.current_value !== null ? m.current_value + ' ' + m.unit : 'N/A';
        col.innerHTML =
            '<div class="box capacity-card">' +
            '<p class="heading">' + m.label + '</p>' +
            '<p class="title is-4">' + current + '</p>' +
            projection +
            '</div>';
        return col;
    }

    function createChart(m) {
        const section = document.createElement('div');
        section.className = 'box capacity-card';
        section.innerHTML =
            '<p class="subtitle is-5">' + m.label + ' — tendencia 7d</p>' +
            '<div class="chart-container"><canvas id="chart-' + m.key + '"></canvas></div>';
        document.getElementById('chartsContainer').appendChild(section);

        const labels = m.daily_avg.map(function(d) { return 'Dia ' + d.day; });
        const values = m.daily_avg.map(function(d) { return d.value; });
        const datasets = [{
            label: m.label + ' (real)',
            data: values,
            borderColor: COLORS[m.key] || '#363636',
            backgroundColor: (COLORS[m.key] || '#363636') + '33',
            fill: true, tension: 0.3
        }];

        // Add projection line if regression available
        if (m.slope !== null && m.intercept !== null && m.daily_avg.length >= 2) {
            const lastDay = m.daily_avg[m.daily_avg.length - 1].day;
            const projDays = 7;
            for (var i = 1; i <= projDays; i++) {
                labels.push('Dia ' + (lastDay + i) + '*');
                values.push(null);
            }
            var projData = new Array(m.daily_avg.length).fill(null);
            // Connect from last real point
            projData[m.daily_avg.length - 1] = m.daily_avg[m.daily_avg.length - 1].value;
            for (var j = 1; j <= projDays; j++) {
                projData.push(Math.round((m.slope * (lastDay + j) + m.intercept) * 100) / 100);
            }
            datasets.push({
                label: m.label + ' (proyeccion)',
                data: projData,
                borderColor: (COLORS[m.key] || '#363636'),
                borderDash: [6, 4],
                pointStyle: 'crossRot',
                fill: false, tension: 0.3
            });
        }

        new Chart(document.getElementById('chart-' + m.key), {
            type: 'line',
            data: { labels: labels, datasets: datasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } },
                scales: { y: { beginAtZero: false } }
            }
        });
    }

    fetch('/capacity/api/data')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            document.getElementById('loadingMsg').remove();
            var cards = document.getElementById('summaryCards');
            data.metrics.forEach(function(m) {
                cards.appendChild(createSummaryCard(m));
                createChart(m);
            });
        })
        .catch(function(err) {
            var msg = document.getElementById('loadingMsg');
            msg.className = 'notification is-danger is-light';
            msg.textContent = 'Error cargando datos: ' + err;
        });
})();
</script>
{% endblock %}
