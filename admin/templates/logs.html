{% extends "base.html" %}
{% block title %}Logs - {{ service }}{% endblock %}

{% block content %}
<nav class="breadcrumb" aria-label="breadcrumbs">
    <ul>
        <li><a href="/containers/">
            <span class="icon"><i class="fas fa-cubes"></i></span>
            <span>Containers</span>
        </a></li>
        <li class="is-active"><a href="#" aria-current="page">{{ service }}</a></li>
    </ul>
</nav>

<h1 class="title">
    <span class="icon-text">
        <span class="icon"><i class="fas fa-file-alt"></i></span>
        <span>Logs: {{ service }}</span>
    </span>
</h1>

<div class="box">
    <div class="level">
        <div class="level-left">
            <div class="level-item">
                <button class="button is-link" id="refreshBtn">
                    <span class="icon"><i class="fas fa-sync-alt"></i></span>
                    <span>Refresh</span>
                </button>
            </div>
            <div class="level-item">
                <div class="field has-addons">
                    <div class="control">
                        <input class="input" type="number" id="linesInput" value="{{ lines }}" min="10" max="10000" style="width: 100px;">
                    </div>
                    <div class="control">
                        <button class="button is-static">lines</button>
                    </div>
                </div>
            </div>
            <div class="level-item">
                <label class="checkbox">
                    <input type="checkbox" id="autoScrollCheck" checked>
                    Auto-scroll
                </label>
            </div>
        </div>
        <div class="level-right">
            <div class="level-item">
                <span id="lastUpdate" class="has-text-grey-light"></span>
            </div>
        </div>
    </div>

    <div id="errorAlert" class="notification is-danger is-hidden">
        <button class="delete" onclick="this.parentElement.classList.add('is-hidden')"></button>
        <span id="errorMessage"></span>
    </div>

    <div id="loadingState" class="has-text-centered">
        <span class="icon is-large">
            <i class="fas fa-spinner fa-pulse fa-2x"></i>
        </span>
        <p>Loading logs...</p>
    </div>

    <pre id="logsOutput" class="output-box is-hidden"></pre>
</div>

<div class="buttons">
    <a class="button" href="/containers/">
        <span class="icon"><i class="fas fa-arrow-left"></i></span>
        <span>Back to Containers</span>
    </a>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const serviceName = '{{ service }}';

function showError(message) {
    document.getElementById('errorMessage').textContent = message;
    document.getElementById('errorAlert').classList.remove('is-hidden');
}

function updateLastUpdate() {
    const now = new Date().toLocaleTimeString();
    document.getElementById('lastUpdate').textContent = `Last update: ${now}`;
}

function scrollToBottom() {
    if (document.getElementById('autoScrollCheck').checked) {
        const output = document.getElementById('logsOutput');
        output.scrollTop = output.scrollHeight;
    }
}

async function loadLogs() {
    document.getElementById('loadingState').classList.remove('is-hidden');
    document.getElementById('logsOutput').classList.add('is-hidden');
    document.getElementById('errorAlert').classList.add('is-hidden');
    
    const lines = document.getElementById('linesInput').value;
    
    try {
        const response = await fetch(`/containers/api/${serviceName}/logs?lines=${lines}`);
        const data = await response.json();
        
        if (!data.success) {
            showError('Failed to load logs: ' + (data.logs || 'Unknown error'));
            document.getElementById('loadingState').classList.add('is-hidden');
            return;
        }
        
        const output = document.getElementById('logsOutput');
        output.textContent = data.logs || '(no logs)';
        updateLastUpdate();
        
        document.getElementById('loadingState').classList.add('is-hidden');
        output.classList.remove('is-hidden');
        
        // Scroll to bottom after content is rendered
        setTimeout(scrollToBottom, 100);
    } catch (error) {
        showError('Failed to load logs: ' + error.message);
        document.getElementById('loadingState').classList.add('is-hidden');
    }
}

// Event listeners
document.getElementById('refreshBtn').addEventListener('click', loadLogs);
document.getElementById('linesInput').addEventListener('change', loadLogs);

// Initial load
loadLogs();
</script>
{% endblock %}
