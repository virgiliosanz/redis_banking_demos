x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  lb-nginx:
    image: ${NGINX_IMAGE:-nginx:1.27.5-alpine}
    container_name: n9-lb-nginx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/lb/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/lb/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/lb/generated:/etc/nginx/generated:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/live/current/public:/var/www/html/live:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/archive/current/public:/var/www/html/archive:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/admin-live/current/public:/var/www/html/admin-live:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/admin-archive/current/public:/var/www/html/admin-archive:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/uploads:/var/www/html/live/wp-content/uploads:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/uploads:/var/www/html/archive/wp-content/uploads:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/uploads:/var/www/html/admin-live/wp-content/uploads:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/uploads:/var/www/html/admin-archive/wp-content/uploads:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/mu-plugins:/var/www/html/live/wp-content/mu-plugins:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/mu-plugins:/var/www/html/archive/wp-content/mu-plugins:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/mu-plugins:/var/www/html/admin-live/wp-content/mu-plugins:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/mu-plugins:/var/www/html/admin-archive/wp-content/mu-plugins:ro
    depends_on:
      fe-live:
        condition: service_started
      fe-archive:
        condition: service_started
      be-admin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      wp-poc-net:
        aliases:
          - lb-nginx

  fe-live:
    build:
      context: .
      dockerfile: php/fpm/Dockerfile
    image: ${PHP_FPM_IMAGE:-nuevecuatrouno-php-fpm:local}
    container_name: n9-fe-live
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      EP_HOST: http://elastic:9200
      ELASTICSEARCH_URL: http://elastic:9200
      EP_SEARCH_ALIAS: n9-search-posts
    volumes:
      - ./php/common:/usr/local/etc/php-fpm.d/zzz-project:ro
      - ./.secrets:/run/project-secrets:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/live/current/public:/var/www/html/live
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/config:/var/www/shared/config:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/uploads:/var/www/html/live/wp-content/uploads
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/mu-plugins:/var/www/html/live/wp-content/mu-plugins
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/live/var/cache/wp-content:/var/www/html/live/wp-content/cache
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      wp-poc-net:
        aliases:
          - fe-live

  fe-archive:
    build:
      context: .
      dockerfile: php/fpm/Dockerfile
    image: ${PHP_FPM_IMAGE:-nuevecuatrouno-php-fpm:local}
    container_name: n9-fe-archive
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      EP_HOST: http://elastic:9200
      ELASTICSEARCH_URL: http://elastic:9200
      EP_SEARCH_ALIAS: n9-search-posts
    volumes:
      - ./php/common:/usr/local/etc/php-fpm.d/zzz-project:ro
      - ./.secrets:/run/project-secrets:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/archive/current/public:/var/www/html/archive
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/config:/var/www/shared/config:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/uploads:/var/www/html/archive/wp-content/uploads
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/mu-plugins:/var/www/html/archive/wp-content/mu-plugins
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/archive/var/cache/wp-content:/var/www/html/archive/wp-content/cache
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      wp-poc-net:
        aliases:
          - fe-archive

  be-admin:
    build:
      context: .
      dockerfile: php/fpm/Dockerfile
    image: ${PHP_FPM_IMAGE:-nuevecuatrouno-php-fpm:local}
    container_name: n9-be-admin
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      EP_HOST: http://elastic:9200
      ELASTICSEARCH_URL: http://elastic:9200
      EP_SEARCH_ALIAS: n9-search-posts
    volumes:
      - ./php/common:/usr/local/etc/php-fpm.d/zzz-project:ro
      - ./.secrets:/run/project-secrets:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/admin-live/current/public:/var/www/html/admin-live
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/admin-archive/current/public:/var/www/html/admin-archive
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/config:/var/www/shared/config:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/uploads:/var/www/html/admin-live/wp-content/uploads
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/uploads:/var/www/html/admin-archive/wp-content/uploads
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/mu-plugins:/var/www/html/admin-live/wp-content/mu-plugins
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/mu-plugins:/var/www/html/admin-archive/wp-content/mu-plugins
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/admin-live/var/cache/wp-content:/var/www/html/admin-live/wp-content/cache
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/admin-archive/var/cache/wp-content:/var/www/html/admin-archive/wp-content/cache
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      wp-poc-net:
        aliases:
          - be-admin

  db-live:
    image: ${MYSQL_IMAGE:-mysql:8.4.6}
    container_name: n9-db-live
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: ${TZ:-Europe/Madrid}
      MYSQL_DATABASE: n9_live
      MYSQL_USER: wp_live
      MYSQL_PASSWORD_FILE: /run/secrets/db_live_mysql_user_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_live_mysql_root_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$(cat /run/secrets/db_live_mysql_root_password)\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    secrets:
      - db_live_mysql_root_password
      - db_live_mysql_user_password
    volumes:
      - ${MYSQL_ROOT_HOST_PATH:-./runtime/mysql}/live:/var/lib/mysql
    logging: *default-logging
    networks:
      wp-poc-net:
        aliases:
          - db-live

  db-archive:
    image: ${MYSQL_IMAGE:-mysql:8.4.6}
    container_name: n9-db-archive
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: ${TZ:-Europe/Madrid}
      MYSQL_DATABASE: n9_archive
      MYSQL_USER: wp_archive
      MYSQL_PASSWORD_FILE: /run/secrets/db_archive_mysql_user_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_archive_mysql_root_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$(cat /run/secrets/db_archive_mysql_root_password)\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    secrets:
      - db_archive_mysql_root_password
      - db_archive_mysql_user_password
    volumes:
      - ${MYSQL_ROOT_HOST_PATH:-./runtime/mysql}/archive:/var/lib/mysql
    logging: *default-logging
    networks:
      wp-poc-net:
        aliases:
          - db-archive

  elastic:
    image: ${ELASTICSEARCH_IMAGE:-elasticsearch:8.15.3}
    container_name: n9-elastic
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"  # POC ONLY — habilitar en producción
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ${ELASTIC_DATA_HOST_PATH:-./runtime/elasticsearch}:/usr/share/elasticsearch/data
    logging: *default-logging
    networks:
      wp-poc-net:
        aliases:
          - elastic

  cron-master:
    build:
      context: .
      dockerfile: php/cli/Dockerfile
    image: ${PHP_CLI_IMAGE:-nuevecuatrouno-php-cli:local}
    container_name: n9-cron-master
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      EP_HOST: http://elastic:9200
      ELASTICSEARCH_URL: http://elastic:9200
      EP_SEARCH_ALIAS: n9-search-posts
    command: ["sh", "-c", "trap : TERM INT; sleep infinity & wait"]
    volumes:
      - ./.secrets:/run/project-secrets:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/live/current/public:/srv/wp/live
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/archive/current/public:/srv/wp/archive
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/admin-live/current/public:/srv/wp/admin-live
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/admin-archive/current/public:/srv/wp/admin-archive
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/config:/var/www/shared/config:ro
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/uploads:/srv/wp/live/wp-content/uploads
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/uploads:/srv/wp/archive/wp-content/uploads
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/uploads:/srv/wp/admin-live/wp-content/uploads
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/uploads:/srv/wp/admin-archive/wp-content/uploads
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/mu-plugins:/srv/wp/live/wp-content/mu-plugins
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/mu-plugins:/srv/wp/archive/wp-content/mu-plugins
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/mu-plugins:/srv/wp/admin-live/wp-content/mu-plugins
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/shared/mu-plugins:/srv/wp/admin-archive/wp-content/mu-plugins
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/live/var/cache/wp-content:/srv/wp/live/wp-content/cache
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/archive/var/cache/wp-content:/srv/wp/archive/wp-content/cache
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/admin-live/var/cache/wp-content:/srv/wp/admin-live/wp-content/cache
      - ${WP_ROOT_HOST_PATH:-./runtime/wp-root}/admin-archive/var/cache/wp-content:/srv/wp/admin-archive/wp-content/cache
      - ./scripts:/opt/project/scripts:ro
    healthcheck:
      test: ["CMD-SHELL", "ps -o comm= 1 | grep -q sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      wp-poc-net:
        aliases:
          - cron-master

networks:
  wp-poc-net:
    name: ${DOCKER_NETWORK_NAME:-wp-poc-net}
    driver: bridge

secrets:
  db_live_mysql_root_password:
    file: ./.secrets/db-live-root-password
  db_live_mysql_user_password:
    file: ./.secrets/db-live-user-password
  db_archive_mysql_root_password:
    file: ./.secrets/db-archive-root-password
  db_archive_mysql_user_password:
    file: ./.secrets/db-archive-user-password
