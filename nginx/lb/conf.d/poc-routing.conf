upstream fe_live {
    zone fe_live 64k;
    server fe-live:9000 resolve;
    keepalive 16;
}

upstream fe_archive {
    zone fe_archive 64k;
    server fe-archive:9000 resolve;
    keepalive 16;
}

upstream be_admin {
    zone be_admin 64k;
    server be-admin:9000 resolve;
    keepalive 16;
}

map $host $host_context {
    default live;
    archive.nuevecuatrouno.test archive;
}

map $uri $path_context {
    default live;
    include /etc/nginx/generated/path-context-map.conf;
}

# Debug headers — only emitted when the request includes "X-Debug-Request: 1".
# To disable entirely, remove or comment the maps below.
map $http_x_debug_request $debug_enabled {
    default "";
    "1"    "1";
}

map $site_context $debug_site_context_value {
    default $site_context;
}

map $debug_enabled $debug_site_context {
    default "";
    "1"    $debug_site_context_value;
}

map $php_upstream $debug_php_upstream_value {
    default $php_upstream;
}

map $debug_enabled $debug_php_upstream {
    default "";
    "1"    $debug_php_upstream_value;
}

# HSTS — only emitted over HTTPS; ignored on plain HTTP (local dev).
map $https $hsts_header {
    default "";
    "on"    "max-age=31536000; includeSubDomains";
}

map $uri $is_admin_path {
    default 0;
    ~^/wp-admin(/|$) 1;
    ~^/wp-admin/(css|images|js)/ 1;
    ~^/wp-includes/ 1;
    /wp-login.php 1;
    /wp-admin/admin-ajax.php 1;
    ~^/wp-json(/|$) 1;
}

map $request_method $is_cacheable_method {
    default 0;
    GET 1;
    HEAD 1;
}

map $http_cookie $has_private_cookie {
    default 0;
    ~*(comment_author_|wordpress_logged_in_|wordpress_sec_|wp-postpass_) 1;
}

map $arg_preview $has_preview_arg {
    default 1;
    "" 0;
    0 0;
}

map $arg_s $has_search_arg {
    default 1;
    "" 0;
}

map "$host|$is_admin_path|$uri" $archive_host_public_block {
    default 0;
    ~^archive\.nuevecuatrouno\.test\|0\|/(?!healthz$|ping$|status$).+ 1;
}

map "$is_admin_path|$host_context|$path_context" $site_context {
    default live;
    "1|live|live" live;
    "1|live|archive" live;
    "1|archive|live" archive;
    "1|archive|archive" archive;
    "0|live|live" live;
    "0|live|archive" archive;
    "0|archive|live" archive;
    "0|archive|archive" archive;
}

map "$is_admin_path|$site_context" $php_upstream {
    default fe_live;
    "0|live" fe_live;
    "0|archive" fe_archive;
    "1|live" be_admin;
    "1|archive" be_admin;
}
map "$is_cacheable_method|$is_admin_path|$has_private_cookie|$has_preview_arg|$has_search_arg" $origin_cache_mode {
    default bypass;
    "1|0|0|0|0" cacheable;
}

map "$origin_cache_mode|$site_context" $page_cache_control {
    default "private, no-store";
    "cacheable|live" "public, max-age=60, s-maxage=300, stale-while-revalidate=30";
    "cacheable|archive" "public, max-age=300, s-maxage=86400, stale-while-revalidate=600";
}

map "$origin_cache_mode|$site_context" $edge_cache_control {
    default "no-store";
    "cacheable|live" "max-age=300, stale-while-revalidate=30, stale-if-error=600";
    "cacheable|archive" "max-age=86400, stale-while-revalidate=600, stale-if-error=86400";
}

map "$origin_cache_mode|$site_context" $origin_cache_policy {
    default "bypass";
    "cacheable|live" "live-public";
    "cacheable|archive" "archive-public";
}

log_format poc_main
    '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    'request_id="$request_id" host="$host" uri="$uri" '
    'request_time="$request_time" upstream_response_time="$upstream_response_time" '
    'php_upstream="$php_upstream" site_context="$site_context" '
    'realip_remote_addr="$realip_remote_addr" '
    'cf_connecting_ip="$http_cf_connecting_ip" '
    'x_forwarded_for="$http_x_forwarded_for" '
    'cf_ray="$http_cf_ray" '
    'referer="$http_referer" user_agent="$http_user_agent"';

server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/access.log poc_main;
    error_log /var/log/nginx/error.log warn;
    client_max_body_size 32m;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security $hsts_header always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; frame-ancestors 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
    # Debug headers — only emitted when request includes "X-Debug-Request: 1"
    add_header X-Debug-Site-Context $debug_site_context always;
    add_header X-Debug-PHP-Upstream $debug_php_upstream always;

    # --- Internal metrics endpoints (restricted to Docker network) ---

    location = /nginx_status {
        stub_status;
        access_log off;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;
    }

    location = /fpm-status-live {
        access_log off;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;
        include /etc/nginx/fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /status;
        fastcgi_param SCRIPT_NAME /status;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_pass fe_live;
    }

    location = /fpm-status-archive {
        access_log off;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;
        include /etc/nginx/fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /status;
        fastcgi_param SCRIPT_NAME /status;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_pass fe_archive;
    }

    location = /fpm-status-admin {
        access_log off;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;
        include /etc/nginx/fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /status;
        fastcgi_param SCRIPT_NAME /status;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_pass be_admin;
    }

    location = /healthz {
        access_log off;
        default_type text/plain;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security $hsts_header always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; frame-ancestors 'self'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
        add_header Cache-Control "no-store" always;
        return 200 "ok\n";
    }

    if ($archive_host_public_block) {
        return 302 http://nuevecuatrouno.test$request_uri;
    }

    location = /xmlrpc.php {
        access_log off;
        return 403;
    }

    location = /wp-config.php {
        access_log off;
        return 404;
    }

    location ~ /\.(?!well-known).* {
        access_log off;
        deny all;
    }

    location ~* \.(bak|conf|dist|fla|inc|ini|log|psd|sh|sql|swp)$ {
        access_log off;
        deny all;
    }

    location ~* ^/wp-admin/(css|images|js)/.+\.(css|gif|ico|jpeg|jpg|js|png|svg|webp|woff|woff2)$ {
        root /var/www/html/wp;
        access_log off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=300" always;
        add_header X-Origin-Cache-Policy "static-asset" always;
        try_files $uri =404;
    }

    location ~* ^/(wp-content/uploads|wp-content/themes|wp-content/plugins|wp-includes)/.+\.(avif|css|eot|gif|ico|jpeg|jpg|js|json|map|png|svg|txt|webp|woff|woff2)$ {
        root /var/www/html/wp;
        access_log off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=300" always;
        add_header X-Origin-Cache-Policy "static-asset" always;
        try_files $uri =404;
    }

    location = /wp-admin {
        return 301 /wp-admin/;
    }

    location = /wp-admin/ {
        rewrite ^ /wp-admin/index.php last;
    }

    location / {
        add_header Cache-Control $page_cache_control always;
        add_header Surrogate-Control $edge_cache_control always;
        add_header X-Origin-Cache-Policy $origin_cache_policy always;
        root /var/www/html/wp;
        index index.php;
        try_files $uri $uri/ @wordpress_front;
    }

    location @wordpress_front {
        include /etc/nginx/fastcgi_params;
        fastcgi_keep_conn on;
        add_header Cache-Control $page_cache_control always;
        add_header Surrogate-Control $edge_cache_control always;
        add_header X-Origin-Cache-Policy $origin_cache_policy always;
        fastcgi_param SCRIPT_FILENAME /var/www/html/wp/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/wp;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param REQUEST_SCHEME $scheme;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_param N9_SITE_CONTEXT $site_context;
        fastcgi_pass $php_upstream;
    }

    location ~ \.php$ {
        set $php_script /var/www/html/wp$fastcgi_script_name;

        if (!-f $php_script) {
            return 404;
        }

        include /etc/nginx/fastcgi_params;
        fastcgi_keep_conn on;
        add_header Cache-Control $page_cache_control always;
        add_header Surrogate-Control $edge_cache_control always;
        add_header X-Origin-Cache-Policy $origin_cache_policy always;
        fastcgi_param SCRIPT_FILENAME $php_script;
        fastcgi_param DOCUMENT_ROOT /var/www/html/wp;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param REQUEST_SCHEME $scheme;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_param N9_SITE_CONTEXT $site_context;
        fastcgi_pass $php_upstream;
    }
}
