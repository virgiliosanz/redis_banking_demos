; Security hardening for PHP runtime.
; Loaded after default php.ini via conf.d scan dir.
; Applies to both FPM and CLI images.

[PHP]
; Hide PHP version from response headers
expose_php = Off

; Never display errors to the browser; log them instead
display_errors = Off
log_errors = On

; Block remote file includes (common attack vector)
allow_url_include = Off

[Session]
; Prevent JavaScript access to session cookies
session.cookie_httponly = On

; Send session cookies only over HTTPS
session.cookie_secure = On

; Reject uninitialized session IDs (session fixation mitigation)
session.use_strict_mode = On
