spring:
  application:
    name: redis-banking-workshop

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  mvc:
    async:
      request-timeout: -1

server:
  port: 8080

openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini
  embedding-model: text-embedding-3-small

workshop:
  ams:
    base-url: ${WORKSHOP_AMS_BASE_URL:http://localhost:8000}
    mcp-url: ${WORKSHOP_AMS_MCP_URL:http://localhost:9000}
    default-namespace: workshop
