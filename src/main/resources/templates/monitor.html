<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Redis Monitor</title>
    <style>
        .monitor-container { max-width: 1120px; margin: 0 auto; padding: 24px 16px; }
        .monitor-header { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
        .monitor-header h1 { font-size: 1.75rem; color: var(--text-primary); }
        .monitor-status { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-code); font-size: 0.85rem; color: var(--text-secondary); }
        .monitor-status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-muted); transition: background var(--transition), box-shadow var(--transition); }
        .monitor-status[data-state="ok"] .monitor-status-dot { background: #22C55E; box-shadow: 0 0 8px rgba(34, 197, 94, 0.5); }
        .monitor-status[data-state="error"] .monitor-status-dot { background: var(--color-danger); box-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }
        .monitor-subtitle { color: var(--text-secondary); margin-bottom: 32px; }
        .monitor-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        @media (max-width: 900px) { .monitor-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 560px) { .monitor-grid { grid-template-columns: 1fr; } }
        .monitor-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 24px; display: flex; flex-direction: column; gap: 8px; transition: background var(--transition), border-color var(--transition); }
        .monitor-card-label { font-family: var(--font-code); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
        .monitor-card-value { font-family: var(--font-code); font-size: 2rem; font-weight: 700; color: var(--text-primary); line-height: 1.1; }
        .monitor-card-sub { font-size: 0.85rem; color: var(--text-secondary); }
        .monitor-card-accent { color: var(--redis-primary); }
        .monitor-bar { height: 8px; background: var(--bg-tertiary); border-radius: var(--border-radius); overflow: hidden; margin-top: 8px; }
        .monitor-bar-fill { height: 100%; background: var(--redis-primary); width: 0%; transition: width var(--transition); }
        .monitor-footer { margin-top: 32px; text-align: center; font-family: var(--font-code); font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="monitor-container">
            <div class="monitor-header">
                <h1>Redis Monitor</h1>
                <span class="monitor-status" id="monitorStatus" data-state="init">
                    <span class="monitor-status-dot"></span>
                    <span id="monitorStatusText">connecting…</span>
                </span>
            </div>
            <p class="monitor-subtitle">Live Redis metrics — polled every 2 seconds. Open in a second tab during the workshop demo.</p>

            <div class="monitor-grid">
                <div class="monitor-card">
                    <span class="monitor-card-label">Memory</span>
                    <span class="monitor-card-value" id="mMemory">—</span>
                    <span class="monitor-card-sub">peak <span id="mMemoryPeak">—</span></span>
                    <div class="monitor-bar"><div class="monitor-bar-fill" id="mMemoryBar"></div></div>
                </div>

                <div class="monitor-card">
                    <span class="monitor-card-label">Keys</span>
                    <span class="monitor-card-value monitor-card-accent" id="mKeys">—</span>
                    <span class="monitor-card-sub">total keys in DB</span>
                </div>

                <div class="monitor-card">
                    <span class="monitor-card-label">Commands</span>
                    <span class="monitor-card-value" id="mCommands">—</span>
                    <span class="monitor-card-sub"><span id="mOps">—</span> ops/sec</span>
                </div>

                <div class="monitor-card">
                    <span class="monitor-card-label">Hit Rate</span>
                    <span class="monitor-card-value" id="mHitRate">—</span>
                    <span class="monitor-card-sub"><span id="mHits">—</span> hits · <span id="mMisses">—</span> misses</span>
                </div>

                <div class="monitor-card">
                    <span class="monitor-card-label">Clients</span>
                    <span class="monitor-card-value monitor-card-accent" id="mClients">—</span>
                    <span class="monitor-card-sub">connected</span>
                </div>

                <div class="monitor-card">
                    <span class="monitor-card-label">Uptime</span>
                    <span class="monitor-card-value" id="mUptime">—</span>
                    <span class="monitor-card-sub">Redis <span id="mVersion">—</span></span>
                </div>
            </div>

            <div class="monitor-footer">
                Last updated: <span id="mUpdated">—</span>
            </div>
        </div>
    </div>

    <div layout:fragment="scripts">
        <script th:src="@{/js/monitor.js}"></script>
    </div>
</body>
</html>
