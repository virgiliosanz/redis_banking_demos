<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      data-theme="light">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE — Redis Banking Workshop">Redis Banking Workshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
    <link th:href="@{/css/redis-brand.css}" rel="stylesheet"/>
    <link th:href="@{/vendor/prism/prism.css}" rel="stylesheet"/>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <a th:href="@{/}" class="nav-brand">
                <span class="nav-logo">⬡</span>
                <span class="nav-title">Redis Banking Workshop</span>
            </a>
            <select class="nav-select" id="useCaseSelect" onchange="if(this.value) window.location.href=this.value">
                <option value="" disabled>Select Use Case</option>
                <option th:value="@{/usecase/1}" th:selected="${#httpServletRequest.requestURI == '/usecase/1'}">1. Authentication Token Store</option>
                <option th:value="@{/usecase/2}" th:selected="${#httpServletRequest.requestURI == '/usecase/2'}">2. Session Storage</option>
                <option th:value="@{/usecase/3}" th:selected="${#httpServletRequest.requestURI == '/usecase/3'}">3. User Profile Storage</option>
                <option th:value="@{/usecase/4}" th:selected="${#httpServletRequest.requestURI == '/usecase/4'}">4. Rate Limiting</option>
                <option th:value="@{/usecase/5}" th:selected="${#httpServletRequest.requestURI == '/usecase/5'}">5. Transaction Deduplication</option>
                <option th:value="@{/usecase/6}" th:selected="${#httpServletRequest.requestURI == '/usecase/6'}">6. Fraud Detection</option>
                <option th:value="@{/usecase/7}" th:selected="${#httpServletRequest.requestURI == '/usecase/7'}">7. Feature Store</option>
                <option th:value="@{/usecase/8}" th:selected="${#httpServletRequest.requestURI == '/usecase/8'}">8. Document Database</option>
                <option th:value="@{/usecase/9}" th:selected="${#httpServletRequest.requestURI == '/usecase/9'}">9. AI Agent Memory + RAG</option>
            </select>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                <span class="theme-icon-light">☀️</span>
                <span class="theme-icon-dark">🌙</span>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <div layout:fragment="content"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <p>Redis Banking Workshop Demo &mdash; Built with Spring Boot 3.x &amp; Redis Stack</p>
        </div>
    </footer>

    <script th:src="@{/vendor/prism/prism.js}"></script>
    <script th:src="@{/vendor/prism/prism-java.js}"></script>
    <script th:src="@{/vendor/prism/prism-bash.js}"></script>
    <script th:src="@{/vendor/prism/prism-json.js}"></script>
    <script th:src="@{/js/main.js}"></script>
    <div layout:fragment="scripts"></div>
</body>
</html>
