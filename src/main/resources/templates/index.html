<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Home</title>
</head>
<body>
    <div layout:fragment="content">
        <section class="hero">
            <h1>Redis Banking Workshop</h1>
        </section>

        <section class="use-case-grid">
            <a th:each="uc : ${useCases}"
               th:href="@{'/usecase/' + ${uc.id}}"
               class="use-case-card">
                <div class="card-header">
                    <span class="card-icon" th:text="${uc.icon}"></span>
                    <span class="card-number" th:text="'UC' + ${uc.id}"></span>
                </div>
                <h2 class="card-title" th:text="${uc.title}"></h2>
                <p class="card-description" th:text="${uc.description}"></p>
                <div class="card-features">
                    <span class="card-feature-badge" th:text="${uc.features}"></span>
                </div>
            </a>
        </section>

        <div style="text-align: center; margin: 24px 0;">
            <a th:href="@{/guide}" class="guide-link-text">📋 Workshop Presenter Guide</a>
        </div>
    </div>
</body>
</html>
